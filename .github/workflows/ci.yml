name: CI

# Lint, typecheck, test (with coverage gates), build, and smoke-test the
# workspace on every PR. Intended as a required status check.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage gates)
        run: pnpm test:coverage

      - name: Smoke test (built CLI)
        run: |
          node packages/cli/dist/map.js --help
          node packages/cli/dist/map.js init
          test -f .map/map.config.json
          node packages/cli/dist/map.js add retrieval/chunking
          test -f .map/patterns/retrieval/chunking/prompt.md
          node packages/cli/dist/map.js doctor
